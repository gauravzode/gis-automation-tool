<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🌦️ Weather App</h1>

<form method="POST">
    <input type="text" name="city" placeholder="Enter city">
    <button type="submit">Get Weather</button>
</form>

{% if error %}
    <p style="color:red">{{ error }}</p>
{% endif %}

{% if weather %}
    <h3>{{ weather.city }}</h3>
    <p>{{ weather.temp }} °C</p>
    <p>{{ weather.desc }}</p>
{% endif %}

</body>
</html>
